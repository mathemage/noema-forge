name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/noema_forge
      DATABASE_URL_NON_POOLING: postgres://postgres:postgres@127.0.0.1:5432/noema_forge
      NEXT_PUBLIC_APP_NAME: NoemaForge
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: noema_forge
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d noema_forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npm run db:push

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
